<svg xmlns="http://www.w3.org/2000/svg"
     width="1280"
     height="320"
     viewBox="0 0 1280 320">

    <defs>

        <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#0D1117"/>
            <stop offset="100%" stop-color="#111827"/>
        </linearGradient>

        <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#7C3AED"/>
            <stop offset="50%" stop-color="#6366F1"/>
            <stop offset="100%" stop-color="#2563EB"/>
        </linearGradient>

        <filter id="glow">
            <feGaussianBlur stdDeviation="6"/>
        </filter>

    </defs>

    <!-- Background -->

    <rect
        width="1280"
        height="320"
        rx="18"
        fill="url(#bg)"/>

    <!-- Border -->

    <rect
        x="1"
        y="1"
        width="1278"
        height="318"
        rx="18"
        fill="none"
        stroke="#30363D"/>

    <!-- Accent -->

    <rect width="1280" height="3" fill="url(#accent)"/>
    <rect y="317" width="1280" height="3" fill="url(#accent)"/>

    <!-- Left Accent -->

    <rect
        x="60"
        y="55"
        width="4"
        height="210"
        rx="2"
        fill="url(#accent)"/>

    <!-- Title -->

    <text
        x="90"
        y="92"
        fill="#FFFFFF"
        font-size="44"
        font-family="Segoe UI, Ubuntu, sans-serif"
        font-weight="700">

        MAURO MARZOCCA

    </text>

    <text
        x="90"
        y="126"
        fill="#A78BFA"
        font-size="20"
        font-family="Segoe UI">

        Cloud &amp; Security Engineer

    </text>

    <text
        x="90"
        y="160"
        fill="#8B949E"
        font-size="17"
        font-family="Segoe UI">

        DevOps • Infrastructure • Linux • Automation

    </text>

    <text
        x="90"
        y="220"
        fill="#C9D1D9"
        font-size="17"
        font-family="Segoe UI">

        Building secure infrastructure through automation

    </text>

    <text
        x="90"
        y="246"
        fill="#C9D1D9"
        font-size="17"
        font-family="Segoe UI">

        and modern engineering.

    </text>

    <!-- Blueprint Grid -->

    <g opacity="0.05" stroke="#FFFFFF">

        <path d="M730 40H1220"/>
        <path d="M730 90H1220"/>
        <path d="M730 140H1220"/>
        <path d="M730 190H1220"/>
        <path d="M730 240H1220"/>

        <path d="M780 30V280"/>
        <path d="M860 30V280"/>
        <path d="M940 30V280"/>
        <path d="M1020 30V280"/>
        <path d="M1100 30V280"/>
        <path d="M1180 30V280"/>

    </g>

    <!-- Architecture -->

    <g
        stroke="url(#accent)"
        stroke-width="2"
        fill="#0D1117">

        <line x1="980" y1="60" x2="980" y2="100"/>
        <line x1="980" y1="120" x2="980" y2="160"/>
        <line x1="980" y1="180" x2="980" y2="220"/>

        <polygon points="980,48 990,54 990,66 980,72 970,66 970,54"/>
        <polygon points="980,108 990,114 990,126 980,132 970,126 970,114"/>
        <polygon points="980,168 990,174 990,186 980,192 970,186 970,174"/>
        <polygon points="980,228 990,234 990,246 980,252 970,246 970,234"/>

    </g>

    <text x="1015" y="62" fill="#FFFFFF" font-size="15">PLAN</text>

    <text x="1015" y="122" fill="#FFFFFF" font-size="15">AUTOMATION</text>

    <text x="1015" y="182" fill="#FFFFFF" font-size="15">INFRASTRUCTURE</text>

    <text x="1015" y="242" fill="#FFFFFF" font-size="15">SECURITY</text>

    <!-- Glow -->

    <rect
        x="90"
        y="275"
        width="250"
        height="4"
        rx="2"
        fill="url(#accent)"
        filter="url(#glow)"/>

</svg>